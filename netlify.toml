# Fluent landing site — Netlify configuration
# Deploys from this repo. Functions live in netlify/functions/.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # Bundle the /files folder into the functions so the download function can read the zips
  included_files = ["files/*"]

# Redirects: route API paths to functions
[[redirects]]
  from = "/api/session"
  to = "/.netlify/functions/session"
  status = 200

[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/download"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# SPA-style fallbacks for thanks page (so /thanks works as well as /thanks.html)
[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200

# Block direct public access to the paid bundle zips.
# The /api/download function reads them from its own bundled filesystem
# (included_files above), so paying customers are unaffected. force = true
# shadows the static files so the public /files/ URLs can't be used to grab
# bundles without checkout.
[[redirects]]
  from = "/files/*"
  to = "/404.html"
  status = 404
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"

# Cache static assets
[[headers]]
  for = "/files/*"
  [headers.values]
    # The bundles themselves shouldn't be cached publicly — they're served via the function with auth
    Cache-Control = "no-store"

# Long-cache immutable, fingerprint-stable assets (fonts, icons, OG images)
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/og/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
